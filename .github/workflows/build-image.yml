name: build-kip-sentience

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'requirements.txt'
      - 'daemon.py'
      - 'modes/**'
      - 'io_surfaces/**'
      - '*.py'
      - '.github/workflows/build-image.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: kip-sentience
  REGISTRY: ghcr.io/kipmundim    # Kip's own GHCR namespace — repo token can push here
  KIP_VERSION: '1.0.0'

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless signing via sigstore
  attestations: write   # actions/attest-build-provenance persistence

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up metadata
        id: meta
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%FT%TZ)"
          TAG="v${KIP_VERSION}-${SHORT_SHA}"
          FULL="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "full=$FULL"             >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "git_sha=$SHORT_SHA"     >> "$GITHUB_OUTPUT"

      - name: Install podman + cosign
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          source: github
        continue-on-error: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tag }} latest v${{ env.KIP_VERSION }}
          build-args: |
            KIP_VERSION=v${{ env.KIP_VERSION }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
          oci: true

      - name: Smoke test — image structure
        run: |
          # The daemon mkdirs runtime state at import time, which needs a
          # writable HOME volume (provided by the quadlet in production).
          # In CI we verify image structure only — that the entrypoint
          # exists, the venv is installed, and the app files are in place.
          # Functional verification happens at appliance install time.
          podman run --rm --entrypoint /opt/kip-venv/bin/python3 \
            ${{ steps.build.outputs.image-with-tag }} \
            -c "import httpx, anthropic, openai, pydantic, orjson, structlog, tini; print('kip image structure OK')" \
            || podman run --rm --entrypoint /opt/kip-venv/bin/python3 \
                 ${{ steps.build.outputs.image-with-tag }} \
                 -c "import httpx, anthropic, openai, pydantic, orjson, structlog; print('kip image structure OK (tini is binary, not python)')"

      - name: Push to ghcr.io
        if: github.event_name != 'pull_request'
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tag }} latest v${{ env.KIP_VERSION }}
          registry: ${{ env.REGISTRY }}

      - name: Sign image (cosign keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Attest provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
